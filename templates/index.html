<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tomato Disease Prediction</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(
                rgba(0,0,0,0.65),
                rgba(0,0,0,0.65)
            ), url("/static/Tomato-Farm-Photo.webp") no-repeat center center/cover;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            width: 600px;
            background: #0f1117;
            border-radius: 12px;
            padding: 30px 40px;
            box-shadow: 0px 15px 40px rgba(0,0,0,0.6);
            color: #fff;
        }

        .card h1 {
            font-size: 32px;
            margin-bottom: 10px;
            color: #ffffff;
        }

        .card p {
            color: #cfcfcf;
            font-size: 15px;
            margin-bottom: 25px;
        }

        .upload-box {
            border: 2px dashed #555;
            border-radius: 10px;
            padding: 25px;
            text-align: center;
            background: #1a1d25;
            transition: 0.3s;
        }

        .upload-box:hover {
            border-color: #4CAF50;
            background: #1f2430;
        }

        .upload-box input {
            display: none;
        }

        .upload-label {
            display: inline-block;
            padding: 12px 25px;
            background: #2c313c;
            border-radius: 8px;
            cursor: pointer;
            color: #ffffff;
            font-weight: 500;
            margin-top: 10px;
        }

        .upload-label:hover {
            background: #3b4150;
        }

        .file-name {
            margin-top: 10px;
            font-size: 14px;
            color: #9fd39f;
        }

        .btn {
            margin-top: 25px;
            padding: 12px 30px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            background: #4CAF50;
            color: white;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover {
            background: #43a047;
        }

        .footer {
            margin-top: 20px;
            text-align: center;
            font-size: 13px;
            color: #aaa;
        }
    </style>
</head>
<body>

<div class="card">
    <h1>Tomato Disease Prediction</h1>
    <p>Please upload the tomato leaf image:</p>

    <form method="POST" action="/predict" enctype="multipart/form-data">

        <div class="upload-box">
            <p>Drag and drop file here</p>
            <p style="font-size:13px;color:#888;">Limit 200MB per file · PNG, JPG, JPEG</p>

            <input type="file" id="file" name="file" required onchange="showFileName()">
            <label for="file" class="upload-label">Browse files</label>

            <div id="file-name" class="file-name"></div>
        </div>

        <button class="btn" type="submit">Process</button>
    </form>

    <div class="footer">
        Powered by Deep Learning 🌱
    </div>
</div>

<script>
function showFileName() {
    const fileInput = document.getElementById("file");
    const fileName = document.getElementById("file-name");
    if (fileInput.files.length > 0) {
        fileName.textContent = fileInput.files[0].name;
    }
}
</script>

</body>
</html>
