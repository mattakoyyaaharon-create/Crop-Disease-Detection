<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Prediction Result</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            font-family: Arial, sans-serif;
           background: linear-gradient(
                rgba(0,0,0,0.65),
                rgba(0,0,0,0.65)
            ), url("/static/Tomato-Farm-Photo.webp") no-repeat center center/cover;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: rgb(19, 19, 19);
            padding: 35px;
            width: 450px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.3);
        }

        h2 {
            color: #1B5E20;
            margin-bottom: 15px;
        }

        img {
            width: 280px;
            border-radius: 12px;
            border: 4px solid #4CAF50;
            margin: 15px 0;
        }

        .message {
            font-size: 20px;
            font-weight: bold;
            color: #2E7D32;
            margin-top: 10px;
        }

        .confidence {
            font-size: 16px;
            color: #388E3C;
            margin-top: 5px;
        }

        .progress-bar {
            background: #E8F5E9;
            border-radius: 20px;
            overflow: hidden;
            margin: 15px 0;
        }

        .progress {
            height: 20px;
            background: linear-gradient(90deg, #66BB6A, #2E7D32);
            
        }

        a {
            display: inline-block;
            margin-top: 20px;
            text-decoration: none;
            background: linear-gradient(45deg, #66BB6A, #2E7D32);
            color: white;
            padding: 10px 25px;
            border-radius: 25px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>🌿 Disease Detection Result</h2>

    <img src="{{ image_path }}" alt="Uploaded Image">

    <!-- ✅ THIS IS THE FIX -->
    <div class="message">
        {{ message }}
    </div>

    <div class="confidence">
        Accuracy: {{ confidence }}%
    </div>

    <div class="progress-bar">
        <div class="progress">{{ confidence }}%</div>
    </div>

    <a href="/">🔄 Predict Another Image</a>
</div>

</body>
</html>
